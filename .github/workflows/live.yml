name: YUGRAAL Live Stream Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: youtube-live-stream
  cancel-in-progress: true

jobs:
  live_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg and Wget
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Download Large Video File
        run: |
          echo "📥 Downloading 1.4GB video from Dropbox..."
          # wget badi files ke liye sabse best aur stable hai
          wget -O spider_video.mp4 "https://www.dropbox.com/scl/fi/9glapboibpvfs3vkg3qji/Spider-Man-2-Stealth-on-Max-Settings-Looks-Unreal-720P_HD.mp4?rlkey=b5929gj61xjwb9y4wh6t09c57&st=m7rmiz1m&dl=1"
          
          # Check karne ke liye ki file sahi se download hui ya nahi (kam se kam 500MB se badi honi chahiye)
          FILESIZE=$(stat -c%s "spider_video.mp4")
          if [ $FILESIZE -lt 500000000 ]; then
            echo "❌ Error: File download failed or incomplete!"
            exit 1
          fi
          echo "✅ Complete 1.4GB video downloaded successfully!"

      - name: Run YUGRAAL Stream
        env:
          YT_STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
        run: |
          ffmpeg -re -stream_loop -1 -i spider_video.mp4 -vcodec libx264 -profile:v main -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k -acodec aac -b:a 128k -f flv "rtmp://a.rtmp.youtube.com/live2/$YT_STREAM_KEY"
