name: YUGRAAL Live Stream Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: youtube-live-stream
  cancel-in-progress: true

jobs:
  live_stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg and Python tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install gdown

      - name: Download Video from Google Drive
        run: |
          echo "📥 Downloading large video from Google Drive..."
          # Tumhari direct Spider-Man file ID yahan set kar di hai
          gdown --id "1jXxRR2tpQXNrwj_jeK2DS0o-sHovkvzE" -O spider_video.mp4 --remaining-ok
          
          # Safety check (File downloaded completely)
          FILESIZE=$(stat -c%s "spider_video.mp4")
          echo "Downloaded file size: $FILESIZE bytes"
          if [ $FILESIZE -lt 500000000 ]; then
            echo "❌ Error: Google Drive download failed or file is too small!"
            exit 1
          fi
          echo "✅ Video downloaded successfully from Drive!"

      - name: Run YUGRAAL Stream
        env:
          YT_STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
        run: |
          ffmpeg -re -stream_loop -1 -i spider_video.mp4 -vcodec libx264 -profile:v main -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k -acodec aac -b:a 128k -f flv "rtmp://a.rtmp.youtube.com/live2/$YT_STREAM_KEY"
