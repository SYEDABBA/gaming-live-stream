name: 24-Hour Continuous Live Stream

on:
  workflow_dispatch: # Manual chalu karne ke liye
  schedule:
    - cron: '0 */5 * * *' # Har 5 ghante me automatic chalega backup ke liye

jobs:
  live_stream:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Warnings thik kar di

    - name: Install FFmpeg and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install requests

    - name: Run YUGRAAL Live Stream Engine
      env:
        YT_STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
      run: |
        python live_stream.py
